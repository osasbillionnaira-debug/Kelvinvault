<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Securing Link | Bob Kelvin</title>
    <style>
        body { background: #050a14; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .box { background: #111b2d; padding: 40px 20px; border-radius: 20px; border: 2px solid #ffd700; width: 90%; max-width: 400px; box-shadow: 0 0 30px rgba(255, 215, 0, 0.1); }
        .loader { border: 5px solid #1e3a5f; border-top: 5px solid #ffd700; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin: 25px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: #ffd700; font-size: 20px; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        p { color: #b0c4de; font-size: 14px; margin-top: 15px; }
        .final-btn { display: none; background: #ffd700; color: #000; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: 900; margin-top: 25px; text-transform: uppercase; font-size: 14px; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3); }
        .whatsapp-btn { display: inline-block; margin-top: 20px; color: #25D366; text-decoration: none; font-size: 12px; font-weight: bold; border: 1px solid #25D366; padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <div id="scan-ui">
            <div class="loader"></div>
            <h2>Scanning Files</h2>
            <p>Checking WR3D mod integrity and 4K assets...</p>
        </div>
        
        <div id="ready-ui" style="display:none;">
            <div style="font-size: 50px; margin-bottom: 10px;">✅</div>
            <h2 style="color: #00ff00;">Security Check Passed</h2>
            <p>The link is secure. You can proceed to MediaFire.</p>
            <a id="final-link" href="#" class="final-btn">Download Now (MediaFire)</a>
            <br>
            <a href="https://wa.me/?text=Check out this awesome WR3D Mod from Bob Kelvin!" class="whatsapp-btn">Invite Friends via WhatsApp</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const target = params.get('url');

        if (target) {
            setTimeout(() => {
                document.getElementById('scan-ui').style.display = 'none';
                document.getElementById('ready-ui').style.display = 'block';
                document.getElementById('final-link').style.display = 'block';
                document.getElementById('final-link').href = target;
            }, 3500); // 3.5 seconds for the "Scan"
        } else {
            document.body.innerHTML = "<h2>Link Expired. Please go back to the Vault.</h2>";
        }
    </script>
</body>
</html>
